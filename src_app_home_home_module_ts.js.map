<div *ngIf="!success && loading">Loading tags...</div>
<div *ngIf="success && !loading">
  <h1 class="title">
    Posts tagged with "{{ postsByTag.name.toUpperCase() }}"
  </h1>
  <ng-container *ngFor="let post of postsByTag.results">
    <article class="box">
      <a routerLink="/post/{{ post._id }}">
        <strong>
          {{ post.title }}
        </strong>
        <span class="dash">-</span>
        <small>
          {{ post.published | date }}
        </small>
      </a>
    </article>
  </ng-container>
</div>
<app-not-found *ngIf="!success && !loading"></app-not-found>
